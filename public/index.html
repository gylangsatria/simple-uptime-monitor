<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title">Uptime Monitor - Status Layanan</title>
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>
    <div class="container">
      <!-- Language Toggle -->
      <div class="lang-bar">
        <button id="langToggle" class="lang-btn" onclick="toggleLanguage()">
          EN
        </button>
      </div>

      <!-- Navigation -->
      <nav class="nav-menu">
        <button
          class="nav-item active"
          data-page="dashboard"
          onclick="showPage('dashboard')"
          data-i18n="navDashboard"
        >
          Dashboard
        </button>
        <button
          class="nav-item"
          data-page="history"
          onclick="showPage('history')"
          data-i18n="navHistory"
        >
          History Down
        </button>
      </nav>

      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page active">
        <h1 data-i18n="dashboardTitle">Status Layanan</h1>
        <p class="subtitle" data-i18n="dashboardSubtitle">
          Monitor ketersediaan layanan secara real-time
        </p>

        <div class="status-summary" id="summary">
          <div class="status-item">
            <span class="number total" id="totalServices">0</span>
            <span class="label" data-i18n="totalLayanan">Total Layanan</span>
          </div>
          <div class="status-item">
            <span class="number up" id="upServices">0</span>
            <span class="label" data-i18n="onlineLabel">Online</span>
          </div>
          <div class="status-item">
            <span class="number down" id="downServices">0</span>
            <span class="label" data-i18n="offlineLabel">Offline</span>
          </div>
        </div>

        <div id="servicesList">
          <div class="loading" data-i18n="checkingServices">
            Mengecek layanan...
          </div>
        </div>

        <button
          class="refresh-btn"
          onclick="checkAllServices()"
          data-i18n="refreshBtn"
        >
          Refresh Status
        </button>
      </div>

      <!-- History Page -->
      <div id="page-history" class="page">
        <h1 data-i18n="historyTitle">History Down</h1>
        <p class="subtitle" data-i18n="historySubtitle">
          Riwayat lengkap kapan layanan down dan up
        </p>

        <div class="history-filters">
          <input
            type="text"
            id="historySearch"
            class="filter-input"
            placeholder="Cari layanan..."
            data-i18n="searchPlaceholder"
            oninput="applyHistoryFilters()"
          />
          <select
            id="historyStatus"
            class="filter-select"
            onchange="applyHistoryFilters()"
          >
            <option value="all" data-i18n="filterAll">Semua</option>
            <option value="down" data-i18n="offlineLabel">Down</option>
            <option value="up" data-i18n="onlineLabel">Up</option>
          </select>
          <span class="filter-date-wrap">
            <span class="filter-date-label" data-i18n="filterFrom">Dari</span>
            <input
              type="date"
              id="historyFrom"
              class="filter-date"
              onchange="applyHistoryFilters()"
            />
          </span>
          <span class="filter-date-wrap">
            <span class="filter-date-label" data-i18n="filterTo">Sampai</span>
            <input
              type="date"
              id="historyTo"
              class="filter-date"
              onchange="applyHistoryFilters()"
            />
          </span>
        </div>

        <div id="historyList">
          <div class="loading" data-i18n="loadingHistory">
            Memuat riwayat...
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span data-i18n="footerText">Terakhir diperbarui:</span>
        <span id="lastUpdate">-</span>
      </div>
    </div>

    <script src="app.js?v=2"></script>
  </body>
</html>
